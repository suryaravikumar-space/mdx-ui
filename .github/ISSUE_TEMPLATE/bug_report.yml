name: Bug Report
description: Report a broken component, CLI error, or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check [existing issues](https://github.com/suryaravikumar-space/mdx-ui/issues).

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Component (rendering/styling)"
        - "CLI (add / init / update)"
        - "MCP server"
        - "remark plugin"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Install component: `npx docsui-cli@latest add callout`
        2. Use `<Callout variant="info">...</Callout>` in MDX
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI Version
      placeholder: "e.g. 0.0.51 — run `npx docsui-cli@latest --version`"

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Next.js
        - Vite + React
        - Astro
        - Other

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Error messages, screenshots, or relevant config.
