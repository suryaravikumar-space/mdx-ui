name: Feature Request
description: Suggest a new component, CLI feature, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please provide as much context as possible.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "New component"
        - "CLI improvement"
        - "MCP server"
        - "remark plugin"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What use case drives this request?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to see. Code examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this feature
