name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build · Typecheck · Lint · Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node }}-

      - name: Build
        run: pnpm turbo run build

      - name: Build registry
        run: pnpm run build:registry

      - name: Verify registry
        run: |
          node -e "import('./registry/registry.json', { with: { type: 'json' } }).then(r => { if (!r.default.components.length) process.exit(1); console.log('Registry OK:', r.default.components.length, 'components') })"

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Test with coverage
        run: pnpm turbo run test:coverage

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-node${{ matrix.node }}
          path: "**/coverage/junit.xml"
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v6
        with:
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false
