name: Deploy Docs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.repository.full_name == github.repository)

    steps:
      - name: Check if apps/www or registry changed
        id: paths
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          CHANGED=$(gh api "repos/${{ github.repository }}/commits/${SHA}" \
            --jq '[.files[]?.filename // ""] | any(startswith("apps/www/") or startswith("packages/registry/"))' \
            2>/dev/null || echo "false")
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Relevant files changed: ${CHANGED}"

      - name: Checkout
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}

      - name: Setup pnpm
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 9.0.6

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-e2e-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-e2e-${{ runner.os }}-

      - name: Build packages
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        run: pnpm turbo run build

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        run: pnpm --filter=@docsui/www exec playwright install --with-deps chromium firefox

      - name: Build www
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        run: pnpm --filter=@docsui/www build

      - name: Run E2E tests
        if: github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true'
        run: pnpm --filter=@docsui/www exec playwright test

      - name: Upload Playwright report
        if: always() && (github.event_name == 'workflow_dispatch' || steps.paths.outputs.changed == 'true')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/www/playwright-report/
          retention-days: 14

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 9.0.6

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build registry
        run: pnpm run build:registry

      - name: Build docs
        run: pnpm turbo run build --filter=@docsui/www

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
