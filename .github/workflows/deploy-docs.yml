name: Deploy Docs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only deploy when CI passed
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check if apps/www or registry changed
        id: paths
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          CHANGED=$(gh api "repos/${{ github.repository }}/commits/${SHA}" \
            --jq '[.files[]?.filename // ""] | any(startswith("apps/www/") or startswith("packages/registry/"))' \
            2>/dev/null || echo "false")
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Relevant files changed: ${CHANGED}"

      - name: Checkout
        if: steps.paths.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        if: steps.paths.outputs.changed == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 9.0.6

      - name: Setup Node
        if: steps.paths.outputs.changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.paths.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build registry
        if: steps.paths.outputs.changed == 'true'
        run: pnpm run build:registry

      - name: Build docs
        if: steps.paths.outputs.changed == 'true'
        run: pnpm turbo run build --filter=@mdx-ui/www

      - name: Deploy to Vercel
        if: steps.paths.outputs.changed == 'true'
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
