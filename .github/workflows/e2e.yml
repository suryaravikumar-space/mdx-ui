name: E2E

on:
  # Manual on-demand runs only
  # Automatic E2E runs as a deploy gate in deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 9.0.6

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-e2e-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-e2e-${{ runner.os }}-

      - name: Build packages
        run: pnpm turbo run build

      - name: Install Playwright browsers
        run: pnpm --filter=@mdx-ui/www exec playwright install --with-deps chromium firefox

      - name: Build www
        run: pnpm --filter=@mdx-ui/www build

      - name: Run E2E tests
        run: pnpm --filter=@mdx-ui/www exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/www/playwright-report/
          retention-days: 14
